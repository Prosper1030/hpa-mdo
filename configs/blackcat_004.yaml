# =============================================================================
# HPA-MDO Baseline Configuration: Black Cat 004
# Human-Powered Aircraft — Wing Spar Structural Optimization
#
# RULES (see claude.md):
#   - ALL engineering parameters live HERE, never hardcoded in Python
#   - Materials are looked up from data/materials.yaml by key
#   - Carbon tube specs are looked up from data/carbon_tubes.csv
#   - Modify this file BEFORE changing any solver code
# =============================================================================

project_name: "Black Cat 004"

# ── Flight Condition ────────────────────────────────────────────────────────
flight:
  velocity: 6.5              # cruise TAS [m/s]
  altitude: 0.0              # sea level [m]
  air_density: 1.225         # ISA sea level [kg/m³]
  kinematic_viscosity: 1.46e-5

# ── Safety Factors (SEPARATE — never conflate) ─────────────────────────────
safety:
  aerodynamic_load_factor: 2.0   # design limit load [G]
  material_safety_factor: 1.5    # applied to material ultimate strength
  ks_rho_stress: 100.0
  ks_rho_buckling: 50.0
  ks_rho_twist: 100.0
  shell_buckling_knockdown: 0.65
  shell_buckling_bending_enhancement: 1.3
  dual_spar_warping_knockdown: 0.5  # conservative-middle value for balsa rib bays (~300 mm spacing)

# ── Mass Breakdown ──────────────────────────────────────────────────────────
weight:
  airframe_kg: 40.0
  pilot_kg: 56.0             # pilot + equipment
  max_takeoff_kg: 100.0

# ── Aero Performance Gates ──────────────────────────────────────────────────
aero_gates:
  min_lift_kg: 100.0         # minimum total lift [kg]
  min_ld_ratio: 25.0         # minimum L/D ratio
  cd_profile_estimate: 0.010 # estimated profile drag coefficient
  max_trim_aoa_deg: 12.0     # maximum trim AoA before stall margin concern [deg]
  max_sideslip_deg: 12.0     # maximum required trimmed sideslip [deg]
  min_spiral_time_to_double_s: 10.0
  beta_sweep_values: [0.0, 5.0, 10.0, 12.0]

# ── Mission Objective ──────────────────────────────────────────────────────
mission:
  objective_mode: "max_range"
  target_range_km: 42.195
  speed_sweep_min_mps: 6.0
  speed_sweep_max_mps: 10.0
  speed_sweep_points: 9
  rider_model: "fake_anchor_curve"
  anchor_power_w: 300.0
  anchor_duration_min: 30.0

# ── Wing Planform ───────────────────────────────────────────────────────────
# NOTE: root_chord / tip_chord are calibrated to the reference .vsp3
# (see scripts/vsp_consistency_check.py).  The reference VSP has a
# 6-station schedule with a flat inboard region (y=0→4.5 m, c=1.30 m);
# config only stores the extremes, while the full schedule is read from
# the reference .vsp3 by VSPBuilder._wing_section_schedule.
#   VSP truth: Sref=35.175 m²  Cref(MAC)=1.130 m  Bref=33.0 m
wing:
  span: 33.0                 # full wingspan [m]
  root_chord: 1.30           # [m] — VSP-calibrated (was 1.39)
  tip_chord: 0.435           # [m] — VSP-calibrated (was 0.47)
  dihedral_root_deg: 0.0
  dihedral_tip_deg: 6.0      # progressive along span
  dihedral_scaling_exponent: 1.0  # 0=uniform, 1=linear, 2=quadratic
  spar_location_xc: 0.25     # main spar at quarter-chord
  airfoil_root: "fx76mp140"  # FX 76-MP-140 (14.0% t/c)
  airfoil_tip: "clarkysm"    # Clark Y SM (11.7% t/c)
  airfoil_root_tc: 0.140     # root max thickness ratio t/c
  airfoil_tip_tc: 0.117      # tip max thickness ratio t/c
  max_tip_twist_deg: 2.0     # torsion constraint [±deg]
  max_tip_deflection_m: 2.5  # max allowable tip deflection [m]

# ── Empennage Geometry ──────────────────────────────────────────────────────
horizontal_tail:
  enabled: true
  name: "Elevator"
  x_location: 6.5            # extended tail arm: L_arm/c_ref≈5.5 (Daedalus-proportional)
  y_location: 0.0
  z_location: 0.0
  span: 4.0                  # full span [m] — enlarged for VH≈0.55
  root_chord: 0.9
  tip_chord: 0.9
  airfoil: "NACA 0009"
  incidence_deg: 0.0
  x_rotation_deg: 0.0
  y_rotation_deg: 0.0
  z_rotation_deg: 0.0
  symmetry: "xz"
  control_surface_name: "elevator"
  control_surface_limit_deg: 20.0

vertical_fin:
  enabled: true
  name: "Fin"
  x_location: 7.0            # moved aft with HT
  y_location: 0.0
  z_location: -0.7
  span: 2.4                  # vertical extent [m]
  root_chord: 0.7
  tip_chord: 0.7
  airfoil: "NACA 0009"
  incidence_deg: 0.0
  x_rotation_deg: 90.0
  y_rotation_deg: 0.0
  z_rotation_deg: 0.0
  symmetry: "none"
  control_surface_name: "rudder"
  control_surface_limit_deg: 25.0

# ── Main Spar — Segmented Carbon-Fiber Tube ─────────────────────────────────
#
# Full wing = 11 tubes × 3.0 m.  The centre tube straddles the
# symmetry plane → half-span sees [1.5, 3.0, 3.0, 3.0, 3.0, 3.0].
# Joints at y = 1.5, 4.5, 7.5, 10.5, 13.5 m.
# Design variables = wall thickness of each of the 6 segments.
#
main_spar:
  material: "carbon_fiber_hm"            # key in data/materials.yaml
  location_xc: 0.25                      # chordwise position (= wing.spar_location_xc)
  layup_mode: "isotropic"
  ply_material: "cfrp_ply_hm"

  # Outer diameter — auto from airfoil thickness if null
  outer_diameter_root: null
  outer_diameter_tip: null
  thickness_fraction_root: 0.65
  thickness_fraction_tip: 0.80

  # Manufacturing constraints
  min_wall_thickness: 0.8e-3             # [m]
  max_segment_length: 3.0                # [m]
  max_ply_drop_per_segment: 1            # max half-layup ply-count step between segments
  min_layup_run_length_m: 1.5            # [m] minimum constant-ply run length

  # Segment layout (half-span, root → tip).
  # Sum must equal half_span = 16.5 m.
  segments: [1.5, 3.0, 3.0, 3.0, 3.0, 3.0]

  # Splice joints
  joint_material: "aluminum_6061_t6"
  joint_mass_kg: 0.15                    # per joint [kg]
  # Joint positions auto-derived: cumsum(segments)[:-1] = [1.5, 4.5, 7.5, 10.5, 13.5]

# ── Rear Spar (Secondary Spar) — Torsion Resistance ────────────────────────
#
# Prevents excessive wing twist under aerodynamic pitching moment.
# Same segmented-tube concept as main spar.
#
rear_spar:
  enabled: true
  # Chordwise offset from main spar (0.70 - 0.25 = 0.45c) creates a gravity
  # torque arm about the main spar elastic axis. This is accounted for in
  # ExternalLoadsComp via rear_gravity_torque_per_span (Finding F12).
  material: "carbon_fiber_hm"
  location_xc: 0.70                      # at 70% chord
  layup_mode: "isotropic"
  ply_material: "cfrp_ply_hm"

  outer_diameter_root: null
  outer_diameter_tip: null
  thickness_fraction_root: 0.55          # typically smaller tube
  thickness_fraction_tip: 0.65

  min_wall_thickness: 0.8e-3
  max_segment_length: 3.0
  max_ply_drop_per_segment: 1            # max half-layup ply-count step between segments
  min_layup_run_length_m: 1.5            # [m] minimum constant-ply run length

  # Uses same segmentation as main spar for rib alignment
  segments: [1.5, 3.0, 3.0, 3.0, 3.0, 3.0]

  joint_material: "aluminum_6061_t6"
  joint_mass_kg: 0.10                    # smaller joints

# ── Lift Wires ──────────────────────────────────────────────────────────────
#
# Attachment y MUST coincide with a joint position (metal fitting).
# Allowed positions: 1.5, 4.5, 7.5, 10.5, 13.5 m.
#
lift_wires:
  enabled: true
  cable_material: "dyneema_sk75"
  cable_diameter: 2.5e-3                 # [m]
  max_tension_fraction: 0.40             # fraction of cable UTS
  wire_angle_deg: 11.3                   # atan(1.5 m drop / 7.5 m span)

  attachments:
    - { y: 7.5, fuselage_z: -1.5, label: "wire-1" }

# ── Structural Solver Options ───────────────────────────────────────────────
#
# failure_criterion controls which material failure criterion is used:
#   "von_mises"  — isotropic σ_vm ≤ σ_allow (default, backward compatible)
#   "tsai_hill"  — Tsai-Hill quadratic for UD CF plies
#   "tsai_wu"    — full Tsai-Wu tensor polynomial (requires F1t/F1c/F2t/F2c/F6)
#
structure:
  failure_criterion: "von_mises"

# ── Solver Settings ─────────────────────────────────────────────────────────
solver:
  n_beam_nodes: 60
  optimizer: "SLSQP"                     # SNOPT if available, else SLSQP
  optimizer_tol: 1.0e-6
  optimizer_maxiter: 500
  max_wall_thickness_m: 0.015
  max_thickness_step_m: 0.003          # max adjacent segment wall-thickness step [m]
  min_radius_m: 0.010
  max_radius_m: 0.060
  max_thickness_to_radius_ratio: 0.8
  rear_min_inner_radius_m: 1.0e-4
  rear_inboard_span_m: 1.5
  rear_inboard_ei_to_main_ratio_max: 0.20
  fem_max_matrix_entry: 1.0e12
  fem_max_disp_entry: 1.0e2
  fem_bc_penalty: 1.0e15
  scipy_eval_cache_size: 2048
  de_max_workers: 4
  main_spar_dominance_margin_m: 0.005
  main_spar_ei_ratio: 2.0
  loaded_shape_z_tol_m: 0.025
  loaded_shape_twist_tol_deg: 0.15
  fsi_coupling: "one-way"
  fsi_max_iter: 20
  fsi_tol: 1.0e-3

# ── File Paths ──────────────────────────────────────────────────────────────
io:
  # `vsp_model` now points to the repo-owned origin clone so geometry truth
  # does not depend on an external SyncFile checkout. Other aero artifacts may
  # still resolve via io.sync_root / configs/local_paths.yaml.
  sync_root: null
  vsp_model: "data/blackcat_004_origin.vsp3"
  vsp_lod: "Aerodynamics/black cat 004 wing only/blackcat 004 wing only_VSPGeom.lod"
  vsp_polar: "Aerodynamics/black cat 004 wing only/blackcat 004 wing only_VSPGeom.polar"
  airfoil_dir: "Aerodynamics/airfoil"
  output_dir: "output/blackcat_004"
  training_db: "database/training_data.csv"

# ── High-Fidelity Validation Stack (Apple Silicon Mac mini) ────────────────
# Blueprint section — see docs/hi_fidelity_validation_stack.md.
# All solvers default to disabled.  Put per-machine binary paths in
# configs/local_paths.yaml so this file stays portable.
hi_fidelity:
  gmsh:
    enabled: false
    binary: null                 # e.g. /opt/homebrew/bin/gmsh
    mesh_size_m: 0.05
  calculix:
    enabled: false
    ccx_binary: null             # e.g. /opt/homebrew/bin/ccx
    cgx_binary: null
  paraview:
    enabled: false
    binary: null                 # e.g. /Applications/ParaView.app/Contents/MacOS/paraview
  su2:
    enabled: false               # planned, not yet implemented
    binary: null
    cfg_template: null
  aswing:
    enabled: false               # set true + binary path on Mac mini with ASWING installed
    binary: null                 # e.g. /usr/local/bin/aswing
    timeout_s: 600
    n_panels: 20                 # vortex panels per half-span
    vinf_mps: null               # null → inherit from flight.velocity (6.5 m/s)
    warn_threshold_pct: 10.0     # % diff before WARN in comparison report

# ── Mass / CG / Inertia Budget (M14) ───────────────────────────────────────
# Coordinate frame: +X aft (toward tail, matching the current project
# geometry), +Y right, +Z down. Origin = aircraft nose tip.
#
# The reserved slots below cover the whole aircraft. Main/rear spar tubes,
# spar joints, and lift wires are auto-derived from the optimizer result and
# should NOT be duplicated here.
mass_budget:
  reference_point_m: [0.0, 0.0, 0.0]
  target_total_mass_kg: 96.0              # weight.airframe_kg + weight.pilot_kg
  include_spar_from_optimization: true
  include_lift_wires_from_geometry: true

  pilot:
    m_kg: 56.0
    xyz_m: [0.40, 0.0, -0.50]   # recumbent under main spar — Daedalus-style pod
    sigma_kg: 2.0
    principal_inertia_kgm2: [4.0, 12.0, 10.0]
    notes: "pilot + clothing + hydration; recumbent, CG at 35% chord behind LE"
    source: estimated

  fuselage_structure:
    m_kg: 11.0
    xyz_m: [1.50, 0.0, -0.15]   # pod heavy, tail boom is light CF tube; CG forward
    sigma_kg: 1.2
    notes: "cockpit pod + tail boom; pod dominates mass, slender boom extends to tail"
    source: estimated

  wing_secondary_structure:
    m_kg: 7.8
    xyz_m: [0.42, 0.0, 0.02]
    sigma_kg: 0.9
    notes: "ribs, film covering, LE/TE members, non-spar fittings"
    source: estimated

  drivetrain:
    m_kg: 3.4
    xyz_m: [0.80, 0.0, -0.25]   # BB/crank at pilot's feet, chain runs aft
    sigma_kg: 0.3
    notes: "crank, chain, bearings, shafting"
    source: estimated

  propeller:
    m_kg: 0.9
    xyz_m: [1.80, 0.0, 0.0]     # pusher prop mounted directly behind cockpit pod
    sigma_kg: 0.1
    principal_inertia_kgm2: [0.020, 0.040, 0.040]
    notes: "pusher blades + hub; located aft of cockpit pod"
    source: vendor

  empennage:
    m_kg: 2.4
    xyz_m: [6.80, 0.0, -0.05]   # HT at 6.5m, fin at 7.0m → CG at 6.8m
    sigma_kg: 0.3
    notes: "horizontal tail, fin, rudder/elevator structure"
    source: estimated

  controls:
    m_kg: 0.8
    xyz_m: [3.50, 0.0, -0.10]   # cables run full tail-boom length ~7m
    sigma_kg: 0.1
    notes: "control cables, horns, guides, return springs"
    source: estimated

  avionics:
    m_kg: 0.35
    xyz_m: [1.35, 0.0, -0.40]
    sigma_kg: 0.05
    notes: "altimeter, variometer, logger"
    source: vendor

  landing_gear:
    m_kg: 0.45
    xyz_m: [1.20, 0.0, 0.20]
    sigma_kg: 0.05
    notes: "main skid and abrasion protection"
    source: estimated

  payload:
    m_kg: 0.25
    xyz_m: [0.40, 0.0, -0.45]   # in cockpit with pilot
    sigma_kg: 0.05
    notes: "water bottle / emergency items"
    source: estimated

  ballast:
    m_kg: 0.0
    xyz_m: [0.15, 0.0, 0.0]
    sigma_kg: 0.0
    notes: "trim ballast placeholder"
    source: placeholder

  miscellaneous:
    m_kg: 0.6
    xyz_m: [2.20, 0.0, -0.10]
    sigma_kg: 0.1
    notes: "bolts, adhesive, fairing scraps, small hardware margin"
    source: estimated

  extra_items:
    telemetry_spare:
      m_kg: 0.0
      xyz_m: [1.40, 0.0, -0.35]
      sigma_kg: 0.0
      notes: "reserved slot for future onboard instrumentation"
      source: placeholder
