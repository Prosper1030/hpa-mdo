updated_at: "2026-04-19"
repo: "hpa-mdo"
status: "active"

official_mainline:
  summary: "VSP / target cruise shape -> inverse design -> jig shape -> realizable loaded shape -> CFRP / discrete layup -> manufacturing-feasible design"
  canonical_shapes:
    - "requested_cruise_shape"
    - "realizable_cruise_shape"
    - "jig_shape"
  truths:
    structural_truth: "dual-beam production / inverse-design artifacts"
    integration_boundary: "python -m hpa_mdo.producer decision interface JSON"
    final_design_layer: "discrete CFRP / layup"
  not_mainline:
    - "equivalent_beam as structural truth"
    - "producer / decision interface as physics mainline"
    - "continuous thickness optimum as final answer"

canonical_read_order:
  - "CURRENT_MAINLINE.md"
  - "README.md"
  - "docs/README.md"
  - "docs/NOW_NEXT_BLUEPRINT.md"
  - "docs/EXECUTION_ROADMAP.md"

official_entrypoints:
  generic_vsp_intake:
    path: "scripts/analyze_vsp.py"
    role: "Read .vsp3, introspect geometry, generate resolved config."
  inverse_design:
    path: "scripts/direct_dual_beam_inverse_design.py"
    role: "Run inverse design and export jig / loaded artifacts."
  avl_outer_loop_campaign:
    path: "scripts/dihedral_sweep_campaign.py"
    role: "Run AVL-first trim/stability/lightweight outer-loop screening before heavier rerun-aero confirmation."
  discrete_layup:
    path: "examples/blackcat_004_optimize.py --discrete-layup"
    role: "Realize discrete CFRP / layup and run Tsai-Wu / manufacturability checks."
  producer:
    path: "python -m hpa_mdo.producer"
    role: "Stable machine-readable integration boundary."

active_tracks:
  track_a:
    name: "mainline_consolidation"
    status: "queued"
    goal: "Make generic VSP intake -> inverse design -> discrete layup feel like one canonical workflow for humans and agents."
  track_b:
    name: "inverse_design_validity_gates"
    status: "baseline_complete"
    goal: "Validity / mismatch / gate outputs have landed; future work is narrower follow-up, not the current main push."
  track_c:
    name: "mac_structural_spotcheck"
    status: "baseline_complete"
    goal: "Mac hi-fi is now a local non-gating structural spot-check; further work should be benchmark- or diagnosis-driven."
  track_d:
    name: "discrete_layup_mainlineization"
    status: "baseline_complete"
    goal: "Discrete layup is now a first-class final design output with machine-readable and summary-text surfacing."
  track_e:
    name: "laminate_recipe_library_selector"
    status: "baseline_complete"
    goal: "Recipe-library and selector foundation are now in place; future work is narrower refinement, not the current main push."
  track_f:
    name: "requested_to_realizable_outer_loop"
    status: "queued"
    goal: "The low-dimensional requested-to-realizable loop remains important, but it is no longer the immediate current wave."
  track_g:
    name: "spanwise_discrete_search_zone_rules"
    status: "baseline_complete"
    goal: "Spanwise DP search and zone rules now exist as a usable baseline; follow-up is refinement, not the current main push."
  track_h:
    name: "rerun_aero_outer_loop_contract"
    status: "baseline_complete"
    goal: "Candidate-owned rerun-aero artifacts and campaign consumer wiring are now in place, but they should now be used mainly for shortlist / finalist confirmation instead of default coarse search."
  track_i:
    name: "rib_properties_foundation"
    status: "baseline_complete"
    goal: "Rib assumptions are now structured as a catalog plus derived warping-knockdown contract."
  track_j:
    name: "rib_bay_surrogate_and_passive_robustness"
    status: "baseline_complete"
    goal: "Rib bay surrogate metrics and passive rib robustness compare paths are now available as baseline diagnostics."
  track_k:
    name: "zonewise_rib_design_contract"
    status: "baseline_complete"
    goal: "Limited zone-wise rib pitch/family freedom now exists in the candidate / winner contract."
  track_l:
    name: "rib_campaign_smoke_validation"
    status: "suspicious"
    goal: "The first rerun-aero smoke replay now completes, but it still only yields sentinel infeasible outcomes and not a useful rib ranking signal."
  track_q:
    name: "vspaero_lod_parser_compatibility"
    status: "baseline_complete"
    goal: "VSPAeroParser and candidate rerun loading now handle the current OpenVSP 3.45.3 .lod/runtime path well enough for real smoke replay."
  track_r:
    name: "rib_multiseed_smoke_signal_hunt"
    status: "queued"
    goal: "Rerun the rib smoke using repaired AVL-first shortlist seeds and look for at least one non-sentinel comparable off-vs-limited result."
  track_s:
    name: "explicit_wire_truss_convergence_unblock"
    status: "baseline_complete"
    goal: "The explicit wire-truss Newton / line-search false non-convergence path is no longer the immediate blocker in the validated replay path."
  track_t:
    name: "ground_clearance_recovery_outer_loop"
    status: "baseline_complete"
    goal: "A ground-clearance recovery ladder now proves the outer-wing jig blocker is recoverable and exposes the first pass-side clearance region."
  track_u:
    name: "avl_first_outer_loop_rebaseline"
    status: "baseline_complete"
    goal: "AVL spanwise plumbing is now available as an outer-loop building block, but it must stay in the legacy-aligned screening role rather than redefining ownership or gates."
  track_v:
    name: "avl_spanwise_ownership_realign"
    status: "baseline_complete"
    goal: "candidate_avl_spanwise now preserves the old AVL-first gate / recovery / load-state rhythm and only adds candidate-owned spanwise lift ownership."
  track_w:
    name: "avl_loadstate_alignment_compare"
    status: "baseline_complete"
    goal: "The side-by-side compare has established that semantic drift is fixed and has isolated structural selected-state alignment as the remaining blocker."
  track_y:
    name: "avl_structural_loadstate_alignment"
    status: "baseline_complete"
    goal: "candidate_avl_spanwise now reuses the legacy structural selected state and only swaps in candidate-owned spanwise lift shape, no longer drifting into the trim-required AVL state."
  track_x:
    name: "repaired_avl_recovered_shortlist_rebuild"
    status: "historical_noncanonical"
    goal: "The first repaired AVL shortlist pass used `dihedral_exponent=2.2` as if it were baseline; keep it as diagnostic evidence, not canonical shortlist truth."
  track_z:
    name: "avl_baseline_exponent_rebaseline"
    status: "baseline_complete"
    goal: "Restore `dihedral_exponent=1.0` as the canonical AVL-first screening baseline, demote `2.2` to recovery-only, and provide a post-fix repaired AVL shortlist with clean full-gate pass-side candidates."
  track_r:
    name: "repaired_shortlist_rib_smoke"
    status: "current"
    goal: "Use the post-fix repaired AVL-first shortlist to run `rib_zonewise=off` vs `limited_zonewise` smoke and determine whether rib ranking now produces a real comparable signal."
  track_m:
    name: "rib_ranking_sanity_tuning"
    status: "queued"
    goal: "Tune rib penalties or surrogate behavior only if replay after Track T shows suspicious ranking behavior with real signal."
  track_n:
    name: "rib_finalist_spotcheck_handoff"
    status: "queued"
    goal: "After multi-seed smoke validation passes, run finalist spot-checks and prepare a more formal rib-on handoff summary."

recently_completed:
  - "Track B baseline: inverse-design validity summary JSON and summary linkage are in place."
  - "Track C baseline: Mac structural spot-check is stabilized as a local non-gating workflow with explicit comparability/diagnostic output."
  - "Track D baseline: discrete_layup_final_design.json and optimization_summary.txt now both surface the final discrete design verdict."
  - "Track E / G baseline: recipe library, spanwise DP search, and zone-dependent rules are now landed as a structural final-design baseline."
  - "Track H baseline: rerun-aero outer-loop core and campaign consumer now distinguish candidate-owned rerun artifacts from legacy refresh."
  - "Track I / J / K baseline: rib properties, rib bay surrogate, passive robustness compare mode, and zone-wise rib design are now integrated into the candidate contract."
  - "Track Q baseline: VSPAeroParser now handles OpenVSP 3.45.3 .lod schema drift, and candidate rerun loading is limited to the main-wing component for monotonic spanwise loads."
  - "Track L replay: rerun-aero smoke now completes, but the first single-seed replay is still suspicious because both rib modes collapse to sentinel infeasible outcomes."
  - "Track R replay: three-seed / six-run rerun-aero smoke still produced only sentinel infeasible outcomes."
  - "Track S replay: explicit wire-truss Newton / line-search false non-convergence has been unblocked on the validated snapshot, and the immediate replay blocker has shifted to ground clearance."
  - "Track T replay: bounded search found the first clearance-pass region at fixed seed (`3.75 < z_scale <= 3.875`, `dihedral_exponent=2.2`, `rib_zonewise=off`) while mass stayed about `21.74 kg`; this is recovery evidence, not canonical screening baseline."
  - "Track U plumbing: AVL strip-force loads now reach the structural path, but the first implementation also changed load-state ownership and only looked structurally sane under `--skip-aero-gates`, with mass near `38.96 kg`."
  - "Track V baseline: candidate_avl_spanwise no longer drifts in gate / recovery semantics and no longer relies on skip-aero-gates to appear sane."
  - "Track W baseline: side-by-side compare proved the remaining blocker was numeric structural selected-state alignment, not parser, recovery, or plumbing."
  - "Track Y baseline: candidate_avl_spanwise structural selected state is now legacy-aligned (`AoA 0.000 deg`, `lift 450.668 N`, `torque 260.296 N*m`) instead of the old trim-required `AoA 12.536 deg` state."
  - "Track Z baseline: post-fix repaired AVL-first bounded search now yields 5/5 clean full-gate pass-side candidates at `exp = 1.0`, and the canonical shortlist is refreshed around `x3.75`, `x3.5`, `x3.875`, with `x4.0` as backup and `x4.25` confirm-only."

next_wave_priorities:
  - "Track R replay: rerun rib smoke on the post-fix repaired shortlist seeds and look for at least one non-sentinel comparable case."
  - "Track M: only if repaired-shortlist replay shows suspicious rib ranking with real signal, tune rib penalties / family cap / surrogate behavior."
  - "Track N: if repaired-shortlist replay looks sane, do finalist spot-check and handoff packaging for rib-on winners."

benchmark_policy:
  status: "open_basket"
  rule: "Do not lock a single historical APDL / ANSYS case as the only benchmark truth."
  current_use:
    - "Historical ANSYS/APDL cases are evidence, not a fixed gate."
    - "Prefer a fresh, comparable dual-beam / jig-oriented case for current validation work."
    - "Treat internal crossval_report.txt as inspection/export-contract evidence, not independent truth."

high_fidelity_status:
  current_role: "local structural spot-check"
  trusted_for:
    - "tip deflection sanity"
    - "max |UZ| sanity"
    - "support reaction sanity"
    - "mass / deck / load-mapping sanity"
  not_trusted_for:
    - "final discrete layup truth"
    - "full aeroelastic sign-off"
    - "final composite hotspot truth"
    - "external validation truth unless an apples-to-apples benchmark exists"

multi_agent_rules:
  default_prompting:
    - "Always read canonical_read_order before touching code."
    - "Use project_state.yaml + one task-pack prompt as the minimum context bundle."
    - "If CURRENT_MAINLINE.md and an old report conflict, CURRENT_MAINLINE.md wins."
    - "If local repo context is insufficient, or a tooling / solver / library fact may have drifted, proactively browse instead of staying blocked."
    - "When browsing, prefer official docs, solver manuals, research papers, and other primary sources over summaries."
    - "In the final report, briefly note what you browsed and what it changed."
  ownership:
    safe_parallel_areas:
      - "docs/task_packs/**"
      - "docs/hi_fidelity_validation_stack.md and src/hpa_mdo/hifi/**"
      - "examples/blackcat_004_optimize.py and discrete-layup-related modules when one owner is assigned per layer"
    avoid_parallel_edits:
      - "README.md"
      - "CURRENT_MAINLINE.md"
      - "docs/GRAND_BLUEPRINT.md"
      - "configs/blackcat_004.yaml"
      - "scripts/direct_dual_beam_inverse_design.py unless one owner is assigned"
      - "src/hpa_mdo/utils/discrete_layup.py unless later-wave ownership is explicit"

task_pack_root: "docs/task_packs/current_parallel_work"
