axes:
  main_spar_family:
    description: "Phase 3.1 preliminary grouped/discrete main spar family table."
    integration_mode: "global_family_material"
    promotion_state: "candidate_ready"
    default_base_material_key: "carbon_fiber_hm"
    packages:
      - key: "main_ref"
        label: "Baseline/reference"
        promotion_state: "candidate_ready"
        layup_reference: "tube_family_total"
        layup_fractions:
          axial_0: 0.60
          shear_pm45: 0.30
          hoop_90: 0.10
        source_material_grade: "Common HM CFRP tube baseline (M40J/M46J-class equivalent)"
        young_scale: 1.00
        shear_scale: 1.00
        density_scale: 1.00
        allowable_scale: 1.00
        description: "Current V2.m++ main spar HM tube family used as the reference package."
        family_description: "Balanced+symmetric HM baseline that preserves all three 0/+/-45/90 roles."
        intended_role: "Reference global family for main spar promotion and nearby-seed screening."
        manufacturing_notes: "Treat as the existing roll-wrapped HM tube family; keep balanced+symmetric and taper transitions gentle."
        buckling_note: "Keeps an explicit 10% hoop share so Brazier/local wall stability is not treated as free."
        requires_balanced_symmetric: true
        property_sources:
          young: "Common HM CFRP tube grade anchored to current carbon_fiber_hm baseline."
          shear: "Preliminary engineering estimate for a 60/30/10 balanced+symmetric family."
          density: "Common cured CFRP tube density already embedded in the current HM baseline."
          allowable: "Base HM compressive allowable divided by material safety factor; no extra package knockdown."
        buckling_rules:
          minimum_hoop_fraction: 0.10
          forbid_outer_pure_axial: true
          conservative_allowable_knockdown: 1.00
          allowed_region: "all_span"
          local_buckling_reserve: "baseline"
          equivalent_gate_credit: "full_global"

      - key: "main_light_ud"
        label: "Light UD / axial-dominant"
        promotion_state: "candidate_ready"
        layup_reference: "tube_family_total"
        layup_fractions:
          axial_0: 0.72
          shear_pm45: 0.18
          hoop_90: 0.10
        source_material_grade: "HM-dominant UD-biased tube family inspired by Daedalus/Atlas-style axial emphasis"
        young_scale: 1.04
        shear_scale: 0.95
        density_scale: 0.975
        allowable_scale: 1.00
        description: "Axial-dominant main tube family that buys mass and bending efficiency at the cost of shear reserve."
        family_description: "Low-dimensional UD-biased family with the minimum retained +/-45 and hoop content."
        intended_role: "Mass-side candidate for the main spar when geometry already carries torsion safely."
        manufacturing_notes: "Use only as a balanced+symmetric family; keep a non-0 outer wrap and avoid abrupt ply-drop style transitions."
        buckling_note: "Carries a deliberate extra allowable knockdown because lower +/-45 content and minimum hoop content make local stability less forgiving."
        requires_balanced_symmetric: true
        property_sources:
          young: "Preliminary engineering estimate anchored to higher 0-degree share and the existing HM baseline."
          shear: "Preliminary engineering estimate with explicit penalty for reduced +/-45 content."
          density: "Preliminary engineering estimate representing a lighter UD-biased family on the current HM baseline."
          allowable: "Base HM allowable held flat before an explicit conservative buckling/local-stability knockdown."
        buckling_rules:
          minimum_hoop_fraction: 0.10
          forbid_outer_pure_axial: true
          conservative_allowable_knockdown: 0.93
          allowed_region: "all_span_non_primary_joint_preferred"
          local_buckling_reserve: "reduced"
          equivalent_gate_credit: "full_global"

      - key: "main_balanced_hm"
        label: "Balanced HM"
        promotion_state: "candidate_ready"
        layup_reference: "tube_family_total"
        layup_fractions:
          axial_0: 0.55
          shear_pm45: 0.30
          hoop_90: 0.15
        source_material_grade: "Balanced HM family with tougher wrap content and explicit hoop reserve"
        young_scale: 0.99
        shear_scale: 1.10
        density_scale: 1.03
        allowable_scale: 1.04
        description: "More balanced HM family that trades a small mass increase for better shear and local-stability reserve."
        family_description: "Balanced+symmetric HM family with extra hoop support relative to the reference tube."
        intended_role: "Margin-side candidate for the main spar when deflection and local reserve both matter."
        manufacturing_notes: "Suitable for the same grouped/discrete manufacturing flow as the reference family; keep 90-degree support plies present through taper regions."
        buckling_note: "Extra hoop content is treated as local stability reserve, but still with a mild knockdown instead of full CLT credit."
        requires_balanced_symmetric: true
        property_sources:
          young: "Preliminary engineering estimate with slight axial penalty for a more balanced HM layup."
          shear: "Preliminary engineering estimate that credits additional +/-45 and hoop participation."
          density: "Common cured HM tube density plus modest wrap/resin increase."
          allowable: "Common HM allowables with a small balanced-layup uplift, then a mild conservative knockdown."
        buckling_rules:
          minimum_hoop_fraction: 0.15
          forbid_outer_pure_axial: true
          conservative_allowable_knockdown: 0.97
          allowed_region: "all_span"
          local_buckling_reserve: "moderate"
          equivalent_gate_credit: "full_global"

  rear_spar_family:
    description: "Screening-only rear spar family table retained for small V2.m++ package screens."
    integration_mode: "global_family_material"
    promotion_state: "screening_only"
    default_base_material_key: "carbon_fiber_hm"
    packages:
