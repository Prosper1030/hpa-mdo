        layup_reference: "tube_family_total"
        layup_fractions:
          axial_0: 0.30
          shear_pm45: 0.60
          hoop_90: 0.10
        source_material_grade: "Common HM rear spar baseline for current V2.m++ screening"
        young_scale: 1.00
        shear_scale: 1.00
        density_scale: 1.00
        allowable_scale: 1.00
        description: "Current V2.m++ rear spar tube family."
        family_description: "Reference torsion-oriented rear spar family."
        intended_role: "Screening reference only; not a formal promotion target in this phase."
        manufacturing_notes: "Keep the rear family balanced+symmetric and do not let hoop support vanish."
        buckling_note: "Baseline rear family keeps only the minimum hoop reserve needed for a first-pass rear tube."
        requires_balanced_symmetric: true
        property_sources:
          young: "Current HM baseline."
          shear: "Current HM baseline used as the rear screening anchor."
          density: "Current HM baseline."
          allowable: "Current HM baseline allowable / safety factor."
        buckling_rules:
          minimum_hoop_fraction: 0.10
          forbid_outer_pure_axial: true
          conservative_allowable_knockdown: 1.00
          allowed_region: "all_span"
          local_buckling_reserve: "baseline"
