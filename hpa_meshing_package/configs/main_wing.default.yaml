component: main_wing
geometry: examples/wing/example.step
out_dir: out/main_wing
units: m
mesh_dim: 3
global_min_size: 0.01
global_max_size: 0.20

boundary_layer:
  enabled: false
  growth_rate: 1.2
  n_layers: 8

farfield:
  enabled: true
  upstream_factor: 5.0
  downstream_factor: 12.0
  lateral_factor: 8.0
  vertical_factor: 8.0

quality_gate:
  max_skewness: null
  min_scaled_jacobian: null
  max_elements: 3000000
  allow_no_bl_fallback: true

fallback:
  max_attempts: 4
  relax_local_size_factor: 1.25
  reduce_bl_layers_step: 2
  increase_global_size_factor: 1.2
  disable_bl_on_final_attempt: true

rules:
  min_feature_size: 0.003
