component: fairing_vented
geometry: examples/fairing_vented/example.step
out_dir: out/fairing_vented
units: m
mesh_dim: 3
global_min_size: 0.004
global_max_size: 0.08

boundary_layer:
  enabled: false
  growth_rate: 1.2
  n_layers: 8

farfield:
  enabled: true
  upstream_factor: 4.0
  downstream_factor: 12.0
  lateral_factor: 6.0
  vertical_factor: 6.0
  wake_box_factor: 6.0

quality_gate:
  max_skewness: null
  min_scaled_jacobian: null
  max_elements: 3000000
  allow_no_bl_fallback: true

fallback:
  max_attempts: 5
  relax_local_size_factor: 1.35
  reduce_bl_layers_step: 2
  increase_global_size_factor: 1.2
  disable_bl_on_final_attempt: true

rules:
  min_feature_size: 0.002
  max_holes: 8
  min_hole_width: 0.008
  min_hole_spacing: 0.010
  supported_vent_shapes:
    - circle
    - ellipse
    - slot
