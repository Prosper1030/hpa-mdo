pack_name: "current_parallel_work"
updated_at: "2026-04-18"
canonical_read_order:
  - "CURRENT_MAINLINE.md"
  - "project_state.yaml"
  - "docs/TARGET_STANDARD_GAP_MAP.md"
  - "docs/TARGET_STANDARD_PROGRAM_PLAN.md"
  - "docs/README.md"
  - "docs/NOW_NEXT_BLUEPRINT.md"

tasks:
  - id: "track_j_rerun_aero_outer_loop_core"
    prompt: "prompts/track_j_rerun_aero_outer_loop_core.md"
    launch_wave: 4
    write_scope:
      - "scripts/direct_dual_beam_inverse_design.py"
      - "src/hpa_mdo/aero/vsp_builder.py"
      - "src/hpa_mdo/aero/vsp_aero.py"
      - "src/hpa_mdo/aero/load_mapper.py"
      - "tests/test_inverse_design.py"
    expected_artifacts:
      - "candidate-level geometry rebuild contract"
      - "rerun-aero artifact / load-ownership evidence"
      - "tests"
  - id: "track_k_rerun_aero_campaign_consumer"
    prompt: "prompts/track_k_rerun_aero_campaign_consumer.md"
    launch_wave: 5
    requires_verification_after:
      - "track_j_rerun_aero_outer_loop_core"
    write_scope:
      - "scripts/direct_dual_beam_inverse_design_feasibility_sweep.py"
      - "scripts/dihedral_sweep_campaign.py"
      - "tests/test_inverse_design.py"
    expected_artifacts:
      - "campaign consumer for rerun-aero artifacts"
      - "winner / reject-reason updates"
      - "tests"

do_not_touch:
  - "README.md"
  - "CURRENT_MAINLINE.md"
  - "docs/GRAND_BLUEPRINT.md"
  - "configs/blackcat_004.yaml"

commit_policy:
  style: "One independent task per commit."
  note: "Do not mix multiple tracks into one commit."

research_policy:
  browse_when_needed: true
  rule: "If local repo context is insufficient, or a tooling / solver / library fact may have drifted, browse instead of staying blocked."
  preferred_sources:
    - "official docs"
    - "solver manuals"
    - "research papers"
    - "other primary sources"
  reporting_note: "Briefly report what was browsed and what it changed."
