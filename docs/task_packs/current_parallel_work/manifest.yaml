pack_name: "current_parallel_work"
updated_at: "2026-04-18"
canonical_read_order:
  - "CURRENT_MAINLINE.md"
  - "project_state.yaml"
  - "docs/TARGET_STANDARD_GAP_MAP.md"
  - "docs/TARGET_STANDARD_PROGRAM_PLAN.md"
  - "docs/RIB_INTEGRATION_PLAN.md"
  - "docs/README.md"
  - "docs/NOW_NEXT_BLUEPRINT.md"

tasks:
  - id: "track_l_rib_properties_foundation"
    prompt: "prompts/track_l_rib_properties_foundation.md"
    launch_wave: 6
    write_scope:
      - "data/rib_properties.yaml"
      - "src/hpa_mdo/core/config.py"
      - "src/hpa_mdo/structure/rib_properties.py"
      - "tests/test_rib_properties.py"
      - "tests/test_spar_properties_partials.py"
    expected_artifacts:
      - "machine-readable rib properties catalog"
      - "derived warping-knockdown contract"
      - "tests"
  - id: "track_m_rib_bay_surrogate_contract"
    prompt: "prompts/track_m_rib_bay_surrogate_contract.md"
    launch_wave: 7
    requires_verification_after:
      - "track_l_rib_properties_foundation"
    write_scope:
      - "src/hpa_mdo/structure/rib_surrogate.py"
      - "scripts/direct_dual_beam_inverse_design.py"
      - "tests/test_inverse_design.py"
    expected_artifacts:
      - "rib bay surrogate metrics"
      - "candidate summary updates"
      - "tests"
  - id: "track_n_passive_rib_robustness_mode"
    prompt: "prompts/track_n_passive_rib_robustness_mode.md"
    launch_wave: 7
    requires_verification_after:
      - "track_l_rib_properties_foundation"
    write_scope:
      - "src/hpa_mdo/structure/dual_beam_mainline/types.py"
      - "src/hpa_mdo/structure/dual_beam_mainline/constraints.py"
      - "src/hpa_mdo/structure/dual_beam_mainline/rib_link.py"
      - "tests/test_dual_beam_mainline.py"
    expected_artifacts:
      - "passive rib robustness mode"
      - "parity vs finite-rib compare path"
      - "tests"
  - id: "track_o_zonewise_rib_design_contract"
    prompt: "prompts/track_o_zonewise_rib_design_contract.md"
    launch_wave: 8
    requires_verification_after:
      - "track_m_rib_bay_surrogate_contract"
      - "track_n_passive_rib_robustness_mode"
    write_scope:
      - "scripts/direct_dual_beam_inverse_design.py"
      - "scripts/direct_dual_beam_inverse_design_feasibility_sweep.py"
      - "tests/test_inverse_design.py"
    expected_artifacts:
      - "zone-wise rib pitch/family contract"
      - "winner selection consume rib design"
      - "tests"

do_not_touch:
  - "README.md"
  - "CURRENT_MAINLINE.md"
  - "docs/GRAND_BLUEPRINT.md"
  - "configs/blackcat_004.yaml"

commit_policy:
  style: "One independent task per commit."
  note: "Do not mix multiple tracks into one commit."

research_policy:
  browse_when_needed: true
  rule: "If local repo context is insufficient, or a tooling / solver / library fact may have drifted, browse instead of staying blocked."
  preferred_sources:
    - "official docs"
    - "solver manuals"
    - "research papers"
    - "other primary sources"
  reporting_note: "Briefly report what was browsed and what it changed."
