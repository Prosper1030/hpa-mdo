pack_name: "current_parallel_work"
updated_at: "2026-04-19"
canonical_read_order:
  - "CURRENT_MAINLINE.md"
  - "project_state.yaml"
  - "docs/TARGET_STANDARD_GAP_MAP.md"
  - "docs/TARGET_STANDARD_PROGRAM_PLAN.md"
  - "docs/RIB_INTEGRATION_PLAN.md"
  - "docs/README.md"
  - "docs/NOW_NEXT_BLUEPRINT.md"

tasks:
  - id: "track_r_repaired_shortlist_rib_smoke"
    prompt: "prompts/track_r_repaired_shortlist_rib_smoke.md"
    launch_wave: 19
    write_scope:
      - "docs/task_packs/current_parallel_work/reports/rib_campaign_smoke_report.md"
    expected_artifacts:
      - "post-fix repaired-shortlist off-vs-limited rib smoke compare with at least one non-sentinel comparable case or a clear new blocker"
      - "explicit verdict of SANE, SUSPICIOUS, or BLOCKED tied to post-fix repaired shortlist seeds"
  - id: "track_z_avl_baseline_exponent_rebaseline"
    prompt: "prompts/track_z_avl_baseline_exponent_rebaseline.md"
    launch_wave: 18
    write_scope:
      - "docs/task_packs/current_parallel_work/reports/avl_baseline_exponent_rebaseline_report.md"
      - "docs/task_packs/current_parallel_work/reports/avl_postfix_shortlist_refresh_report.md"
    expected_artifacts:
      - "apples-to-apples compare of `dihedral_exponent=1.0` vs `2.2` under the repaired AVL-first path"
      - "clear statement that `2.2` is recovery-only unless evidence proves otherwise"
      - "canonical repaired shortlist built from the restored `exp=1.0` baseline and refreshed after the AVL fixes"
  - id: "track_m_rib_signal_sanity_tuning"
    prompt: "prompts/track_m_rib_signal_sanity_tuning.md"
    launch_wave: 20
    write_scope:
      - "scripts/direct_dual_beam_inverse_design.py"
      - "scripts/direct_dual_beam_inverse_design_feasibility_sweep.py"
      - "tests/test_inverse_design.py"
      - "docs/task_packs/current_parallel_work/reports/rib_signal_sanity_tuning_report.md"
    expected_artifacts:
      - "minimal rib-ranking tuning patch tied to repaired-shortlist smoke evidence"
      - "before/after report explaining what changed and why"
  - id: "track_n_rib_finalist_spotcheck_handoff"
    prompt: "prompts/track_n_rib_finalist_spotcheck_handoff.md"
    launch_wave: 21
    write_scope:
      - "docs/task_packs/current_parallel_work/reports/rib_finalist_spotcheck_handoff.md"
    expected_artifacts:
      - "rib finalist shortlist with spot-check/handoff recommendation"
      - "clear recommendation on whether any rib-on candidate is ready for heavier confirm or handoff"

do_not_touch:
  - "README.md"
  - "CURRENT_MAINLINE.md"
  - "docs/GRAND_BLUEPRINT.md"
  - "configs/blackcat_004.yaml"

commit_policy:
  style: "One independent task per commit."
  note: "Do not mix multiple tracks into one commit."

research_policy:
  browse_when_needed: true
  rule: "If local repo context is insufficient, or a tooling / solver / library fact may have drifted, browse instead of staying blocked."
  preferred_sources:
    - "official docs"
    - "solver manuals"
    - "research papers"
    - "other primary sources"
  reporting_note: "Briefly report what was browsed and what it changed."
