pack_name: "current_parallel_work"
updated_at: "2026-04-19"
canonical_read_order:
  - "CURRENT_MAINLINE.md"
  - "project_state.yaml"
  - "docs/TARGET_STANDARD_GAP_MAP.md"
  - "docs/TARGET_STANDARD_PROGRAM_PLAN.md"
  - "docs/RIB_INTEGRATION_PLAN.md"
  - "docs/README.md"
  - "docs/NOW_NEXT_BLUEPRINT.md"

tasks:
  - id: "track_v_avl_spanwise_ownership_realign"
    prompt: "prompts/track_v_avl_spanwise_ownership_realign.md"
    launch_wave: 15
    write_scope:
      - "scripts/dihedral_sweep_campaign.py"
      - "scripts/direct_dual_beam_inverse_design.py"
      - "src/hpa_mdo/aero/avl_spanwise.py"
      - "tests/test_avl_spanwise.py"
      - "tests/test_inverse_design.py"
      - "docs/task_packs/current_parallel_work/reports/avl_spanwise_realign_report.md"
    expected_artifacts:
      - "repaired candidate_avl_spanwise path that preserves old AVL-first gate/recovery/load-state semantics while adding spanwise lift distribution"
      - "tests proving the new path no longer drifts by silently redefining AoA/load-state ownership"
      - "a real smoke or bounded replay report showing what changed and what still remains out of scope"
  - id: "track_w_avl_loadstate_alignment_compare"
    prompt: "prompts/track_w_avl_loadstate_alignment_compare.md"
    launch_wave: 16
    write_scope:
      - "docs/task_packs/current_parallel_work/reports/avl_loadstate_alignment_report.md"
    expected_artifacts:
      - "side-by-side comparison of legacy_refresh, repaired candidate_avl_spanwise, and candidate_rerun_vspaero on the same seed(s)"
      - "clear verdict on whether repaired candidate_avl_spanwise is now effectively old AVL-first flow plus spanwise lift ownership"
  - id: "track_x_repaired_avl_recovered_shortlist_rebuild"
    prompt: "prompts/track_x_repaired_avl_recovered_shortlist_rebuild.md"
    launch_wave: 17
    write_scope:
      - "docs/task_packs/current_parallel_work/reports/repaired_avl_shortlist_report.md"
    expected_artifacts:
      - "2 to 4 repaired AVL-first shortlist seeds ready for downstream confirm / rib smoke"
      - "clear handoff note telling the next agent which seed to use first and why"

do_not_touch:
  - "README.md"
  - "CURRENT_MAINLINE.md"
  - "docs/GRAND_BLUEPRINT.md"
  - "configs/blackcat_004.yaml"

commit_policy:
  style: "One independent task per commit."
  note: "Do not mix multiple tracks into one commit."

research_policy:
  browse_when_needed: true
  rule: "If local repo context is insufficient, or a tooling / solver / library fact may have drifted, browse instead of staying blocked."
  preferred_sources:
    - "official docs"
    - "solver manuals"
    - "research papers"
    - "other primary sources"
  reporting_note: "Briefly report what was browsed and what it changed."
