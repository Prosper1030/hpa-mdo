pack_name: "current_parallel_work"
updated_at: "2026-04-18"
canonical_read_order:
  - "CURRENT_MAINLINE.md"
  - "project_state.yaml"
  - "docs/TARGET_STANDARD_GAP_MAP.md"
  - "docs/dual_beam_recipe_library_architecture.md"
  - "docs/README.md"
  - "docs/NOW_NEXT_BLUEPRINT.md"

tasks:
  - id: "track_e_recipe_library_foundation"
    prompt: "prompts/track_e_recipe_library_foundation.md"
    launch_wave: 1
    write_scope:
      - "src/hpa_mdo/structure/material_proxy_catalog.py"
      - "docs/dual_beam_preliminary_material_packages.md"
      - "tests/test_material_proxy_catalog.py"
    expected_artifacts:
      - "functional recipe family foundation"
      - "property-row / lookup contract"
      - "tests"
  - id: "track_f_outer_loop_campaign_contract"
    prompt: "prompts/track_f_outer_loop_campaign_contract.md"
    launch_wave: 1
    write_scope:
      - "scripts/direct_dual_beam_inverse_design_feasibility_sweep.py"
      - "scripts/dihedral_sweep_campaign.py"
      - "tests/test_inverse_design.py"
    expected_artifacts:
      - "candidate score / reject-reason contract"
      - "larger quick-analysis search budget handling"
      - "tests"
  - id: "track_g_discrete_final_design_wiring"
    prompt: "prompts/track_g_discrete_final_design_wiring.md"
    launch_wave: 1
    write_scope:
      - "examples/blackcat_004_optimize.py"
      - "src/hpa_mdo/utils/visualization.py"
      - "tests/test_optimizer_buckling.py"
      - "tests/test_discrete_layup.py"
    expected_artifacts:
      - "discrete final-design verdict surfacing"
      - "structural recheck / summary wiring"
      - "tests"
  - id: "track_h_spanwise_dp_search"
    prompt: "prompts/track_h_spanwise_dp_search.md"
    launch_wave: 2
    requires_verification_after:
      - "track_e_recipe_library_foundation"
    write_scope:
      - "src/hpa_mdo/utils/discrete_spanwise_search.py"
      - "src/hpa_mdo/utils/discrete_layup.py"
      - "tests/test_discrete_spanwise_search.py"
      - "tests/test_discrete_layup.py"
    expected_artifacts:
      - "DP / shortest-path spanwise selector"
      - "transition-rule handling"
      - "tests"
  - id: "track_i_zone_dependent_rules"
    prompt: "prompts/track_i_zone_dependent_rules.md"
    launch_wave: 3
    requires_verification_after:
      - "track_h_spanwise_dp_search"
    write_scope:
      - "src/hpa_mdo/utils/discrete_layup.py"
      - "docs/dual_beam_preliminary_material_packages.md"
      - "tests/test_discrete_layup.py"
    expected_artifacts:
      - "zone-dependent floor / ply-drop rules"
      - "gate / reinforcement assumptions"
      - "tests"

do_not_touch:
  - "README.md"
  - "CURRENT_MAINLINE.md"
  - "docs/GRAND_BLUEPRINT.md"
  - "configs/blackcat_004.yaml"

commit_policy:
  style: "One independent task per commit."
  note: "Do not mix multiple tracks into one commit."

research_policy:
  browse_when_needed: true
  rule: "If local repo context is insufficient, or a tooling / solver / library fact may have drifted, browse instead of staying blocked."
  preferred_sources:
    - "official docs"
    - "solver manuals"
    - "research papers"
    - "other primary sources"
  reporting_note: "Briefly report what was browsed and what it changed."
