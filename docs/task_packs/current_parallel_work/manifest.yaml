pack_name: "current_parallel_work"
updated_at: "2026-04-18"
canonical_read_order:
  - "CURRENT_MAINLINE.md"
  - "project_state.yaml"
  - "docs/TARGET_STANDARD_GAP_MAP.md"
  - "docs/README.md"
  - "docs/NOW_NEXT_BLUEPRINT.md"

tasks:
  - id: "track_a_frontdoor_workflow"
    prompt: "prompts/track_a_frontdoor_workflow.md"
    write_scope:
      - "docs/README.md"
      - "docs/dual_beam_workflow_architecture_overview.md"
      - "docs/task_packs/current_parallel_work/**"
    expected_artifacts:
      - "front-door workflow update"
      - "artifact navigation / handoff-ready docs"
      - "minimal verification"
  - id: "track_e_surrogate_warm_start"
    prompt: "prompts/track_e_surrogate_warm_start.md"
    write_scope:
      - "src/hpa_mdo/utils/surrogate.py"
      - "src/hpa_mdo/utils/data_collector.py"
      - "src/hpa_mdo/structure/optimizer.py"
      - "scripts/collect_surrogate_data.py"
      - "tests/test_surrogate.py"
      - "pyproject.toml"
    expected_artifacts:
      - "optional surrogate backend"
      - "warm-start wiring"
      - "training-data / collection hook"
      - "tests"
  - id: "track_f_requested_realizable_outer_loop"
    prompt: "prompts/track_f_requested_realizable_outer_loop.md"
    write_scope:
      - "scripts/direct_dual_beam_inverse_design_feasibility_sweep.py"
      - "scripts/dihedral_sweep_campaign.py"
      - "tests/test_inverse_design.py"
      - "docs/task_packs/current_parallel_work/**"
    expected_artifacts:
      - "low-dimensional aero-shape knob -> inverse design -> jig / layup / realizable score summary"
      - "requested-vs-realizable mismatch evidence"
      - "tests"

do_not_touch:
  - "README.md"
  - "CURRENT_MAINLINE.md"
  - "docs/GRAND_BLUEPRINT.md"
  - "configs/blackcat_004.yaml"

commit_policy:
  style: "One independent task per commit."
  note: "Do not mix multiple tracks into one commit."

research_policy:
  browse_when_needed: true
  rule: "If local repo context is insufficient, or a tooling / solver / library fact may have drifted, browse instead of staying blocked."
  preferred_sources:
    - "official docs"
    - "solver manuals"
    - "research papers"
    - "other primary sources"
  reporting_note: "Briefly report what was browsed and what it changed."
